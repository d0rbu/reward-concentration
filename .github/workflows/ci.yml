name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --locked
      - name: Ruff
        run: uv run ruff check .
      - name: Ty
        run: uv run ty check
      - name: Pytest
        run: uv run pytest
